paths:

  /v1/honeydukes/doceria/usuario:
    post:
      tags:
        - Usuário
      summary: Adiciona um novo usuário
      description: Endpoint para enviar os dados dos usuário a serem cadastrados

      requestBody:
        description: JSON contendo os dados do novo usuário
        required: true

        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Usuario'

      responses:
        '201':
          description: Usuario cadastrado com sucesso

        '400':
          description: Invalid input

        '415':
          description: Invalid Content-Type

        '500':
          description: Error Internal Server (Controller / Model)

    get:
      tags:
        - Usuário

      summary: Lista todos os Usuários
      description: Listagem de todos os usuarios registrados no sistema

      responses:
        '200':
          description: Successful operation

          content:
            application/json:
              schema:
                type: array

                items:
                  $ref: '#/components/schemas/Usuario'

        '404':
          description: Not Found

        '500':
          description: Error Internal Server (Controller / Model)

  /v1/honeydukes/doceria/usuario/{id}:

    get:
      tags:
        - Usuário
      summary: Busca um usuário pelo ID
      description: Retorna um usuário pelo ID

      parameters:
        - name: id
          in: path
          description: ID para realizar a busca do usuário
          required: true

          schema:
            type: integer
            format: int64

      responses:
        '200':
          description: Successful operation

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuário'

        '400':
          description: Invalid ID supplied

        '404':
          description: Not Found

        '500':
          description: Error Internal Server (Controller / Model)

    put:
      tags:
        - Usuário

      summary: Atualiza um usuário pelo ID
      description: Buscar e atualizar um usuário pelo ID

      parameters:
        - name: id
          in: path
          description: ID para atualizar um usuário
          required: true

          schema:
            type: integer
            format: int64

      requestBody:
        description: Dados para atualizar um usuário
        required: true

        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Usuario'

      responses:
        '200':
          description: Successful operation

        '400':
          description: Invalid ID supplied

        '404':
          description: Usuário not found

        '415':
          description: Invalid Content-Type

        '500':
          description: Error Internal Server (Controller / Model)

    delete:
      tags:
        - Usuário

      summary: Deletar um usuário existente
      description: Excluir um usuário

      parameters:
        - name: id
          in: path
          description: ID do usuário
          required: true

          schema:
            type: integer
            format: int64

