components:

  schemas:
    Usuario:
      type: object

      required:
        - nome
        - email
        - senha
      properties:

        id:
          type: integer
          example: 1

        nome:
          type: string
          example: Bruno

        email:
          type: string
          example: brunohaddadalves75@gmail.com

        senha:
          type: string
          example: bruno234

    Doce:
      type: object

      required:
        - nome
        - valor
        - descricao
        - avaliacao
        - id_categoria

      properties:

        id:
          type: integer
          example: 1

        nome:
          type: string
          example: Doce de Goiaba

        valor:
          type: number
          example: 15.99

        descricao:
          type: string
          example: "Doce sabor goiaba, com recheio cremoso e irresistível"

        avaliacao:
          type: number
          format: float
          example: 5.00

        id_categoria:
          type: number
          example: 1

        id_sabor:
          type: number
          example: [
            id : 1,
            id : 2
          ]

    Sabor:
       type: object

       required:
        - nome

       properties:

        id:
          type: integer
          example: 1

        nome:
          type: string
          example: Chocolate

    Categoria:
       type: object

       required:
        - categoria

       properties:

        id:
          type: integer
          example: 1

        categoria:
          type: string
          example: 1

    Status:
          type: object

     
          required:
             - status
     
          properties:
     
            id:
               type: integer
               example: 1
     
            status:
               type: string
               example: Ativo

  requestBodies:

    Doce:
      description: Objeto que deve ser enviado no body das requisições

      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Doce'
    Sabor:
      description: Objeto que deve ser enviado no body das requisições

      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Sabor'
    Categoria:
      description: Objeto que deve ser enviado no body das requisições
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Categoria'


    
